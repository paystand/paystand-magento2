<div class="payment-method ps-payment-method" data-bind="css: {'_active': (getCode() == isChecked())}">
    <div class="ps-payment-box border rounded-lg" style="padding: 10px 12px;" data-bind="css: {'border-2 border-blue-500 bg-blue-50': (getCode() == isChecked()), 'border border-gray-300': (getCode() != isChecked())}">
        <div class="payment-method-title field choice flex items-center justify-between">
            <div class="flex items-center">
                <input type="radio" name="payment[method]" class="radio"
                    data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()" />
            <label data-bind="attr: {'for': getCode()}" class="label flex items-center cursor-pointer ml-2">
                <img data-bind="attr: {src: require.toUrl('PayStand_PayStandMagento/images/logo_paystand_small.png')}" alt="PayStand" style="height: 20px;"/>
            </label>
            </div>
        </div>
        <div class="actions-toolbar flex justify-center w-full" style="margin-top: 8px;" data-bind="visible: (getCode() == isChecked())">
            <div id="ps_checkout"></div>
            <button afterRender="onCompleteCheckout" class="ps-button text-white text-sm py-2 px-5 rounded font-medium disabled:opacity-50 disabled:cursor-not-allowed" ps-container-id="ps_checkout" ps-width="400px"
                ps-height="700px" data-bind="click: loadCheckout" disabled
                style="background-color: #00ACEE;">Pay with Paystand</button>
            <p id="progressBar" class="text-xs text-gray-400 ml-2 self-center hidden">Loading... <span id="countdown"></span></p>
        </div>
    </div>
    <div class="payment-method-content">
        <div class="checkout-agreements-block" afterRender="watchAgreement">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() -->
            <!-- /ko -->
            <!--/ko-->
        </div>
        <form class="form paystand-checkout-form" action="#" method="post" style="display: none">
            <input class="submit-trigger" type="hidden"
                data-bind="click: placeOrder, enable: (getCode() == isChecked())" />
        </form>
    </div>
</div>
